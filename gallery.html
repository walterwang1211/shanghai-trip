<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>上海慢活之旅 - 景點圖片</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans TC",sans-serif;background:#f8fafc;overflow-x:hidden}
img{max-width:100%;height:auto;border-radius:12px}
</style>
</head>
<body class="pb-24">
<div class="bg-blue-900 text-white shadow-md sticky top-0 z-50">
<div class="max-w-4xl mx-auto px-4 py-3">
<h1 class="text-lg md:text-xl font-bold tracking-wide">上海慢活之旅・圖片Gallery</h1>
<p class="text-xs md:text-sm text-blue-200 mt-0.5">11/4-11/8 • 六人家族行</p>
</div></div>

<div class="max-w-4xl mx-auto px-4 pt-6 space-y-6">
<div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
<img src="images/pudong.jpg" class="w-full rounded-lg mb-3" alt="上海天際線">
<h2 class="text-xl font-bold text-gray-900 mb-2">✨ 代表性圖片</h2>
<p class="text-sm text-gray-600">上海浦東天際線・夜景</p>
</div>

<div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
<h3 class="text-lg font-bold text-gray-900 mb-3">🏨 酒店</h3>
<div class="grid grid-cols-2 md:grid-cols-3 gap-3">
<img src="images/hotel_room.jpg" class="rounded-lg" alt="酒店房間">
</div>
</div>

<div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
<h3 class="text-lg font-bold text-gray-900 mb-3">🏯 景點</h3>
<div class="grid grid-cols-2 md:grid-cols-3 gap-3">
<img src="images/xintiandi.jpg" class="rounded-lg" alt="新天地">
<img src="images/yuyuan.jpg" class="rounded-lg" alt="豫園">
<img src="images/jingan.jpg" class="rounded-lg" alt="靜安寺">
<img src="images/wukang_rd.jpg" class="rounded-lg" alt="武康路">
<img src="images/tianzifang.jpg" class="rounded-lg" alt="田子坊">
<img src="images/zhujiajiao.jpg" class="rounded-lg" alt="朱家角">
</div>
</div>

<div class="bg-white rounded-xl p-4 shadow-sm border group border-gray-100">
<h3 class="text-lg font-bold text-gray-900 mb-3">🍜 美食</h3>
<div class="grid grid-cols-2 md:grid-cols-3 gap-3">
<img src="images/xiaolongbao.jpg" class="rounded-lg" alt="小籠包">
<img src="images/braised_pork.jpg" class="rounded-lg" alt="紅燒肉">
<img src="images/spring.jpg" class="rounded-lg" alt="春秋航空">
</div>
</div>

<div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
<h3 class="text-lg font-bold text-gray-900 mb-3">🗺️ 行程地圖</h3>
<div class="grid grid-cols-2 md:grid-cols-3 gap-3">
<img src="images/map_day1.png" class="rounded-lg" alt="Day 1 地圖">
<img src="images/map_day2.png" class="rounded-lg" alt="Day 2 地圖">
<img src="images/map_day3.png" class="rounded-lg" alt="Day 3 地圖">
<img src="images/map_day4.png" class="rounded-lg" alt="Day 4 地圖">
<img src="images/map_day5.png" class="rounded-lg" alt="Day 5 地圖">
</div>
</div>
</div>

<script>
window.addEventListener('resize',()=>{if(window.matchMedia('(max-width: 767px)').matches)location.reload()});
</script>
</body>
</html>
